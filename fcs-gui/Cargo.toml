[package]
name = "fcs-gui"
edition.workspace = true
license.workspace = true
version.workspace = true
description = "Face Crop Studio — redesigned egui desktop application."

[lib]
path = "src/lib.rs"

[[bin]]
name = "fcs-gui"
path = "src/main.rs"

[dependencies]
anyhow.workspace = true
arboard.workspace = true
eframe.workspace = true
egui.workspace = true
egui_extras = { workspace = true, features = ["svg"] }
fcs-core.workspace = true
fcs-utils = { workspace = true, features = ["mapping", "webcam"] }
image.workspace = true
imageproc.workspace = true
ico.workspace = true
log.workspace = true
lru.workspace = true
rayon.workspace = true
rfd.workspace = true
serde.workspace = true
serde_json.workspace = true
tempfile.workspace = true

[dev-dependencies]
sha2.workspace = true

[target.'cfg(target_os = "windows")'.dependencies]
windows.workspace = true

[build-dependencies]
winresource.workspace = true

# `cargo-deb` packaging metadata. Asset paths are resolved relative to this
# Cargo.toml. The PNG is generated by `installer/linux/build_linux.sh` from
# the SVG logo before `cargo deb` runs; the model is downloaded by CI.
[package.metadata.deb]
name = "face-crop-studio"
maintainer = "Gregory Carnegie <gregory.carnegie+claude_ai@gmail.com>"
copyright = "2026, Gregory Carnegie. Licensed under MIT OR Apache-2.0."
license-file = ["../LICENSE-MIT", "0"]
extended-description = """\
Face Crop Studio is a GPU-accelerated face detection and batch portrait \
cropping tool built on YuNet, egui, and wgpu. It bundles the YuNet ONNX \
model and ships both a GUI and CLI."""
section = "graphics"
priority = "optional"
depends = "$auto, libc6 (>= 2.35)"
assets = [
    ["../target/release/fcs-gui", "usr/bin/", "755"],
    [
        "../models/face_detection_yunet_2023mar_640.onnx",
        "usr/share/face-crop-studio/models/",
        "644",
    ],
    [
        "../installer/linux/face-crop-studio.desktop",
        "usr/share/applications/",
        "644",
    ],
    [
        "../installer/linux/face-crop-studio.png",
        "usr/share/icons/hicolor/256x256/apps/",
        "644",
    ],
    ["../README.md", "usr/share/doc/face-crop-studio/README.md", "644"],
]
